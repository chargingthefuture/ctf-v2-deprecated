name: Cleanup Old Artifacts and Close CI Budget Issues

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *' # daily at 2am UTC

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete old workflow artifacts
        uses: c-hive/gha-remove-artifacts@v1
        with:
          age: '1d' # delete artifacts older than 1 day
          skip-tags: 'false'

      - name: Find open CI budget monitor issues
        id: find_issues
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'ci-budget-monitor',
            });
            const issueNumbers = issues.data.map(issue => issue.number);
            core.setOutput('issue_numbers', issueNumbers.join(','));

      - name: Close CI budget monitor issues
        if: steps.find_issues.outputs.issue_numbers != ''
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumbers = process.env.ISSUE_NUMBERS || '';
            if (!issueNumbers) return;
            for (const num of issueNumbers.split(',')) {
              await github.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: Number(num),
                body: 'Artifacts cleaned up automatically. Closing issue.'
              });
              await github.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: Number(num),
                state: 'closed'
              });
            }
        env:
          ISSUE_NUMBERS: ${{ steps.find_issues.outputs.issue_numbers }}
