name: Expo Android Release

on:
  push:
    tags:
      - "mobile-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release-android-apk:
    name: Build and Release Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ctf
    steps:
      - name: Check EXPO_TOKEN presence
        id: expo_token
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          set -euo pipefail
          if [ -n "$EXPO_TOKEN" ]; then
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Explain skip
        if: ${{ steps.expo_token.outputs.has_token == 'false' }}
        run: echo "EXPO_TOKEN secret is not configured. Expo Android release build was skipped."

      - name: Checkout
        if: ${{ steps.expo_token.outputs.has_token == 'true' }}
        uses: actions/checkout@v4

      - name: Setup Node
        if: ${{ steps.expo_token.outputs.has_token == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable Corepack
        if: ${{ steps.expo_token.outputs.has_token == 'true' }}
        run: corepack enable

      - name: Install workspace dependencies
        if: ${{ steps.expo_token.outputs.has_token == 'true' }}
        run: |
          set -euo pipefail
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          else
            pnpm install --no-frozen-lockfile
          fi

      - name: Validate mobile Expo config exists
        if: ${{ steps.expo_token.outputs.has_token == 'true' }}
        run: |
          set -euo pipefail
          test -f packages/mobile/eas.json
          test -f packages/mobile/app.config.ts

      - name: Validate mobile env contract
        if: ${{ steps.expo_token.outputs.has_token == 'true' }}
        env:
          MOBILE_ENV_TARGET: production
          EXPO_MOBILE_PROJECT_ID: ${{ vars.EXPO_MOBILE_PROJECT_ID }}
          MOBILE_PROJECT_ID: ${{ vars.MOBILE_PROJECT_ID }}
          EXPO_MOBILE_UPDATES_URL: ${{ vars.EXPO_MOBILE_UPDATES_URL }}
          MOBILE_UPDATES_URL: ${{ vars.MOBILE_UPDATES_URL }}
          MOBILE_APP_URL: ${{ vars.MOBILE_APP_URL }}
          MOBILE_CLERK_PUBLISHABLE_KEY_STAGING: ${{ secrets.MOBILE_CLERK_PUBLISHABLE_KEY_STAGING }}
          MOBILE_CLERK_PUBLISHABLE_KEY_PRODUCTION: ${{ secrets.MOBILE_CLERK_PUBLISHABLE_KEY_PRODUCTION }}
        run: |
          set -euo pipefail
          cd packages/mobile
          pnpm run check:mobile-env

      - name: Build Android APK with EAS
        if: ${{ steps.expo_token.outputs.has_token == 'true' }}
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          set -euo pipefail
          cd packages/mobile
          pnpm dlx eas-cli@latest build --platform android --profile production --non-interactive --wait --json > ../../android-build.json

      - name: Resolve APK URL
        if: ${{ steps.expo_token.outputs.has_token == 'true' }}
        run: |
          set -euo pipefail
          cd ..
          BUILD_URL=$(node -e "const fs=require('fs'); const j=JSON.parse(fs.readFileSync('android-build.json','utf8')); const arr=Array.isArray(j)?j:[j]; const candidate=arr.find(x=>x?.platform==='ANDROID'||x?.platform==='android')||arr[0]; const url=candidate?.artifacts?.buildUrl||candidate?.artifacts?.applicationArchiveUrl||''; if(!url){process.exit(1);} process.stdout.write(url);")
          echo "BUILD_URL=$BUILD_URL" >> "$GITHUB_ENV"

      - name: Download APK artifact
        if: ${{ steps.expo_token.outputs.has_token == 'true' }}
        run: |
          set -euo pipefail
          cd ..
          curl -fsSL "$BUILD_URL" -o ti-skills-economy-android.apk

      - name: Upload APK artifact to workflow
        if: ${{ steps.expo_token.outputs.has_token == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: ti-skills-economy-android-apk
          path: ti-skills-economy-android.apk

      - name: Publish GitHub Release (tag builds)
        if: ${{ steps.expo_token.outputs.has_token == 'true' && startsWith(github.ref, 'refs/tags/mobile-v') }}
        uses: softprops/action-gh-release@v2
        with:
          files: ti-skills-economy-android.apk
          generate_release_notes: true
