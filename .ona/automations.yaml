tasks:
  setup:
    name: Setup environment
    description: Install CLIs (Railway, Vercel, expo-cli, pnpm) and system libraries required for Expo/React Native DevTools.
    command: |
      # Install Codacy CLI if not present
      .codacy/cli.sh --version || bash .codacy/cli.sh

      # Install Railway CLI
      if ! command -v railway &> /dev/null; then
        npm install -g @railway/cli
      fi

      # Install Vercel CLI
      if ! command -v vercel &> /dev/null; then
        npm install -g vercel
      fi

      # Ensure pnpm is installed
      if ! command -v pnpm &> /dev/null; then
        npm install -g pnpm
      fi

      # System libraries required for Expo/React Native DevTools
      sudo apt-get update && sudo apt-get install -y \
        libatk1.0-0 libgtk-3-0 libnotify4 libgdk-pixbuf2.0-0 \
        libxss1 libasound2 libnss3 libx11-xcb1

      # Install expo-cli
      if ! command -v expo &> /dev/null; then
        pnpm add -g expo-cli
      fi
    triggeredBy:
      - postDevcontainerStart

  install:
    name: Install dependencies
    description: Install all monorepo dependencies via pnpm.
    command: pnpm install
    triggeredBy:
      - postDevcontainerStart
    dependsOn:
      - setup
