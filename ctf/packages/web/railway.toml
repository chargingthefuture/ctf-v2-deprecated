[build]
# Supports Railway services configured with root directory = ctf/packages/web.
command = "corepack enable && corepack prepare pnpm@9.12.0 --activate && pnpm install --no-frozen-lockfile --prod=false --filter @ctf/web... && pnpm --filter @ctf/web build"

[start]
command = "corepack enable && corepack prepare pnpm@9.12.0 --activate && pnpm --filter @ctf/web start"
