auditEvents:
  - eventId: uuid
    timestamp: rfc3339
    actorId: principal
    pluginId: directory
    command: directory.profile.upsert
    commandVersion: 1.0.0
    purpose: profile_management
    policyDecision:
      status: allow_or_deny
      reason: policy_reason_code
      evidence:
        roleCheck: pass_or_fail
        profileOwnershipCheck: pass_or_fail
        claimedUnclaimedGuardCheck: pass_or_fail
    dataClassesAccessed:
      - directory_profile_metadata
      - profile_visibility_metadata
    targetContext:
      workspaceId: workspace_identifier
      profileId: profile_identifier
    requestId: request_identifier
    traceId: trace_identifier
    result:
      status: success_or_failure
      errorCategory: none_or_error_class

  - eventId: uuid
    timestamp: rfc3339
    actorId: principal
    pluginId: directory
    command: directory.list.fetch
    commandVersion: 1.0.0
    purpose: directory_discovery
    policyDecision:
      status: allow_or_deny
      reason: policy_reason_code
      evidence:
        roleCheck: pass_or_fail
        visibilityFilterCheck: pass_or_fail
    dataClassesAccessed:
      - directory_public_projection_metadata
      - selector_filter_metadata
    targetContext:
      workspaceId: workspace_identifier
      listingRequestId: request_identifier
    requestId: request_identifier
    traceId: trace_identifier
    result:
      status: success_or_failure
      errorCategory: none_or_error_class

  - eventId: uuid
    timestamp: rfc3339
    actorId: principal
    pluginId: directory
    command: directory.admin.announcement.upsert
    commandVersion: 1.0.0
    purpose: admin_communications
    policyDecision:
      status: allow_or_deny
      reason: policy_reason_code
      evidence:
        roleCheck: pass_or_fail
        csrfCheck: pass_or_fail
        payloadValidationCheck: pass_or_fail
    dataClassesAccessed:
      - directory_announcement_metadata
      - admin_mutation_audit_metadata
    targetContext:
      workspaceId: workspace_identifier
      announcementId: announcement_identifier
    requestId: request_identifier
    traceId: trace_identifier
    result:
      status: success_or_failure
      errorCategory: none_or_error_class
