auditEvents:
  - eventId: uuid
    timestamp: rfc3339
    actorId: principal
    pluginId: workforce
    command: workforce.dashboard.fetch
    commandVersion: 1.0.0
    purpose: workforce_visibility
    policyDecision:
      status: allow_or_deny
      reason: policy_reason_code
      evidence:
        roleCheck: pass_or_fail
        projectionOnlyCheck: pass_or_fail
    dataClassesAccessed:
      - workforce_dashboard_projection
      - canonical_metric_rollup_metadata
    targetContext:
      workspaceId: workspace_identifier
      dashboardRequestId: request_identifier
    requestId: request_identifier
    traceId: trace_identifier
    result:
      status: success_or_failure
      errorCategory: none_or_error_class

  - eventId: uuid
    timestamp: rfc3339
    actorId: principal
    pluginId: workforce
    command: workforce.profile.update
    commandVersion: 1.0.0
    purpose: workforce_profile_management
    policyDecision:
      status: allow_or_deny
      reason: policy_reason_code
      evidence:
        roleCheck: pass_or_fail
        profileOwnershipCheck: pass_or_fail
        policyValidationCheck: pass_or_fail
    dataClassesAccessed:
      - workforce_profile_metadata
      - profile_change_event_metadata
    targetContext:
      workspaceId: workspace_identifier
      profileId: profile_identifier
    requestId: request_identifier
    traceId: trace_identifier
    result:
      status: success_or_failure
      errorCategory: none_or_error_class

  - eventId: uuid
    timestamp: rfc3339
    actorId: principal
    pluginId: workforce
    command: workforce.export.job.create
    commandVersion: 1.0.0
    purpose: workforce_reporting_exports
    policyDecision:
      status: allow_or_deny
      reason: policy_reason_code
      evidence:
        roleCheck: pass_or_fail
        exportScopeCheck: pass_or_fail
        piiGuardCheck: pass_or_fail
    dataClassesAccessed:
      - workforce_report_export_metadata
      - export_job_status_metadata
    targetContext:
      workspaceId: workspace_identifier
      exportJobId: export_job_identifier
    requestId: request_identifier
    traceId: trace_identifier
    result:
      status: success_or_failure
      errorCategory: none_or_error_class

  - eventId: uuid
    timestamp: rfc3339
    actorId: principal
    pluginId: workforce
    command: workforce.admin.config.update
    commandVersion: 1.0.0
    purpose: workforce_governance
    policyDecision:
      status: allow_or_deny
      reason: policy_reason_code
      evidence:
        roleCheck: pass_or_fail
        csrfCheck: pass_or_fail
        configValidationCheck: pass_or_fail
    dataClassesAccessed:
      - workforce_config_metadata
      - admin_mutation_audit_metadata
    targetContext:
      workspaceId: workspace_identifier
      configVersion: config_version_identifier
    requestId: request_identifier
    traceId: trace_identifier
    result:
      status: success_or_failure
      errorCategory: none_or_error_class
