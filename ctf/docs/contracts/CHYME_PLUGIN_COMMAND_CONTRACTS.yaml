contracts:
  - pluginId: chyme
    command: chyme.room.state.fetch
    version: 1.0.0
    description: Fetch current Chyme room state and participant roster for authenticated room members.
    inputSchema:
      includeParticipants:
        type: boolean
        required: false
    outputSchema:
      roomId:
        type: string
      roomName:
        type: string
      callActive:
        type: boolean
      participants:
        type: array
    dataAccess:
      - chyme_rooms
      - chyme_room_members
      - chyme_service_profiles
    purpose: social_audio_presence
    retentionClass: derived_short_lived
    idempotency: true

  - pluginId: chyme
    command: chyme.message.send
    version: 1.0.0
    description: Send a chat message to the Chyme room with bounded text validation.
    inputSchema:
      text:
        type: string
        required: true
      clientMessageId:
        type: string
        required: false
    outputSchema:
      id:
        type: string
      sentAtIso:
        type: string
    dataAccess:
      - chyme_messages
      - chyme_room_members
    purpose: social_audio_chat
    retentionClass: communication_medium_lived
    idempotency: false

  - pluginId: chyme
    command: chyme.call.join
    version: 1.0.0
    description: Join Chyme room call and provision Stream user/channel credentials.
    inputSchema:
      roomId:
        type: string
        required: false
    outputSchema:
      ok:
        type: boolean
      streamChannelId:
        type: string
      streamToken:
        type: string
      streamUserId:
        type: string
    dataAccess:
      - chyme_rooms
      - chyme_room_members
      - stream_channel_metadata
    purpose: social_audio_call_join
    retentionClass: operational_medium_lived
    idempotency: true

  - pluginId: chyme
    command: chyme.profile.delete.service
    version: 1.0.0
    description: Delete user-scoped Chyme service data while preserving account-level identity.
    inputSchema:
      confirm:
        type: boolean
        required: true
    outputSchema:
      ok:
        type: boolean
      scope:
        type: string
      deletedAtIso:
        type: string
    dataAccess:
      - chyme_service_profiles
      - chyme_room_members
      - chyme_messages
      - chyme_deletion_events
    purpose: service_scoped_deletion
    retentionClass: compliance_long_lived
    idempotency: true
