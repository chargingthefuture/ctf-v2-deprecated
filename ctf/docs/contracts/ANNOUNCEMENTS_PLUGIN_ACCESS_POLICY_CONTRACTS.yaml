policies:
  - pluginId: announcements
    command: announcements.draft.create
    version: 1.0.0
    requiredRoles:
      - admin
    attributePolicies:
      tenancy: same_workspace
      targetingValidation: required
    consentRequirements:
      scopes:
        - announcements_admin_authoring
      fallbackLawfulBasis: legitimate_interest_safety_support
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
    highRiskFlags:
      containsPHI: false
      requiresAdditionalAudit: true
    denyConditions:
      - actor_not_admin
      - invalid_targeting_constraints
      - cross_workspace_access

  - pluginId: announcements
    command: announcements.publish
    version: 1.0.0
    requiredRoles:
      - admin
    attributePolicies:
      tenancy: same_workspace
      publishApproval: required
    consentRequirements:
      scopes:
        - announcements_admin_publish
      fallbackLawfulBasis: legitimate_interest_safety_support
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
    highRiskFlags:
      containsPHI: false
      requiresAdditionalAudit: true
    denyConditions:
      - actor_not_admin
      - missing_publish_approval
      - cross_workspace_access

  - pluginId: announcements
    command: announcements.read.mark
    version: 1.0.0
    requiredRoles:
      - member
    attributePolicies:
      tenancy: same_workspace
      actorMustOwnReadState: true
    consentRequirements:
      scopes:
        - announcements_consumption
      fallbackLawfulBasis: legitimate_interest_safety_support
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
    highRiskFlags:
      containsPHI: false
      requiresAdditionalAudit: false
    denyConditions:
      - actor_not_authenticated
      - cross_workspace_access
